<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAKAMOONA HUB GALLERY</title>
<link rel="icon" type="image/x-icon" href="logo.png">

<style type="text/css">
body {
  cursor: url('http://www.rw-designer.com/cursor-extern.php?id=235241'), auto;}
</style>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
}
header {
    text-align: center;
    padding: 40px 20px;
}
header h1 {
    font-size: 2.5rem;
}
header p {
    color: #94a3b8;
}
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}
.card {
    background: #1e293b;
    border-radius: 15px;
    overflow: hidden;
    transition: transform 0.3s ease;
}
.card:hover {
    transform: scale(1.05);
}
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}
.card-content {
    padding: 15px;
    text-align: center;
}
button {
    margin: 5px;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
.preview {
    background: #3b82f6;
    color: white;
}
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}
.modal img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 10px;
}
</style>
</head>
<body>

<header>
    <h1>WELCOME TO BAKAMOONA HUB GALLERY</h1>
    <p>You can watch photos</p>
</header>

<div class="gallery" id="gallery"></div>

<div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script>
const images = [
    {name: "Photo 1", src: "p1.jpeg"},
    {name: "Photo 2", src: "p2.jpeg"},
    {name: "Photo 3", src: "p3.jpeg"},
    {name: "Photo 4", src: "p4.jpeg"},
    {name: "Photo 5", src: "p5.png"},
    {name: "Photo 6", src: "p6.png"},
    {name: "Photo 7", src: "p7.png"},
    {name: "Photo 8", src: "p8.jpeg"},
    {name: "Photo 9", src: "p9.jpeg"},
    {name: "Photo 10", src: "p10.jpeg"}
];

const gallery = document.getElementById("gallery");

images.forEach(img => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <img src="${img.src}" alt="${img.name}">
        <div class="card-content">
            <h3>${img.name}</h3>
            <button class="preview" onclick="previewImage('${img.src}')">Preview</button>
        </div>
    `;

    gallery.appendChild(card);
});

function previewImage(src) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalImg").src = src;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

// 🔐 Basic protection (still optional)
document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", function(e) {
    if (e.key === "F12" || 
        (e.ctrlKey && e.shiftKey && e.key === "I") || 
        (e.ctrlKey && e.key === "u")) {
        e.preventDefault();
    }
});
</script>

</body>
</html>
